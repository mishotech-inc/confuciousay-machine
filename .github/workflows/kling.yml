name: kling-clips
on:
  workflow_dispatch:   # manual, one-shot (rerun-safe: skips clips that already exist)
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install requests
      - name: Generate the 8 clips via fal.ai
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
          REPO: ${{ github.repository }}
        run: python3 kling_generate.py
      - name: Commit clips
        if: always()
        run: |
          git config user.name "confuciousay-machine"
          git config user.email "actions@users.noreply.github.com"
          git add kling-clips/ || true
          git diff --cached --quiet || (git commit -m "kling: clip batch" && git pull --rebase && git push)
