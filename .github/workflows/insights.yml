name: insights
on:
  schedule:
    - cron: "0 13 * * 0"   # Sunday 6am PT, before the Cowork reweight pass
  workflow_dispatch:
permissions:
  contents: write
jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install requests
      - name: Pull post metrics
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python3 insights.py
      - name: Commit
        run: |
          git config user.name "confuciousay-machine"
          git config user.email "actions@users.noreply.github.com"
          git add logs/
          git diff --cached --quiet || (git commit -m "log: insights $(date -u +%F)" && git pull --rebase && git push)
